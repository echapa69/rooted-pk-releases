name: Build NSIS Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: "App version to build (e.g. 1.0.8)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-nsis:
    runs-on: windows-latest
    steps:
      - name: Checkout releases repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install electron-builder
        run: npm install --save-dev electron-builder@26.8.1

      - name: Extract NSIS binaries
        shell: pwsh
        run: |
          $ver  = "3.0.4.1"
          $url  = "https://github.com/electron-userland/electron-builder-binaries/releases/download/nsis-$ver/nsis-$ver.7z"
          $tmp  = "$env:GITHUB_WORKSPACE\nsis-$ver.7z"
          $dest = "$env:GITHUB_WORKSPACE\nsis-bin"

          Write-Host "Downloading NSIS $ver ..."
          Invoke-WebRequest -Uri $url -OutFile $tmp -UseBasicParsing
          Write-Host "Downloaded: $((Get-Item $tmp).Length) bytes"

          Remove-Item -Recurse -Force $dest -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $dest | Out-Null

          Write-Host "Extracting to $dest ..."
          & "C:\Program Files\7-Zip\7z.exe" x $tmp -o"$dest" -y
          if ($LASTEXITCODE -ne 0) {
            Write-Error "7-Zip failed (exit $LASTEXITCODE)"
            exit 1
          }

          Write-Host "Archive contents at $dest :"
          Get-ChildItem $dest | Select-Object Name, PSIsContainer | Format-Table

          $elevate = Get-ChildItem -Path $dest -Filter "elevate.exe" -Recurse | Select-Object -First 1
          if (-not $elevate) {
            Write-Error "elevate.exe not found in $dest !"
            Get-ChildItem -Recurse $dest | Select-Object FullName | Format-Table
            exit 1
          }
          Write-Host "elevate.exe found at: $($elevate.FullName)"

          if ($elevate.DirectoryName -ne $dest) {
            Write-Host "Flattening from $($elevate.DirectoryName) to $dest"
            Copy-Item "$($elevate.DirectoryName)\*" -Destination $dest -Recurse -Force
          }

          Write-Host "NSIS ready at $dest"
          Get-ChildItem $dest | Select-Object Name | Format-Table

          "ELECTRON_BUILDER_NSIS_DIR=$dest" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Exported ELECTRON_BUILDER_NSIS_DIR=$dest"

      - name: Update package.json version
        shell: pwsh
        run: |
          $pkg = Get-Content "package.json" | ConvertFrom-Json
          $pkg.version = "${{ inputs.version }}"
          $pkg | ConvertTo-Json -Depth 10 | Set-Content "package.json"
          Write-Host "Version set to ${{ inputs.version }}"

      - name: Download win-unpacked zip
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $zipName = "Rooted.PK-${{ inputs.version }}-win.zip"
          $url = "https://github.com/${{ github.repository }}/releases/download/v${{ inputs.version }}/$zipName"
          Write-Host "Downloading: $url"
          Invoke-WebRequest -Uri $url -OutFile "win-unpacked.zip" `
            -Headers @{ Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}" }
          Write-Host "Extracting into win-unpacked\ ..."
          Remove-Item -Recurse -Force "win-unpacked" -ErrorAction SilentlyContinue
          Expand-Archive -Path "win-unpacked.zip" -DestinationPath "win-unpacked" -Force
          Write-Host "win-unpacked\ top-level:"
          Get-ChildItem "win-unpacked" | Select-Object Name | Format-Table

      - name: Verify NSIS binaries still present
        shell: pwsh
        run: |
          Write-Host "ELECTRON_BUILDER_NSIS_DIR=$env:ELECTRON_BUILDER_NSIS_DIR"
          if (-not (Test-Path "$env:ELECTRON_BUILDER_NSIS_DIR\elevate.exe")) {
            Write-Error "elevate.exe MISSING from $env:ELECTRON_BUILDER_NSIS_DIR before build!"
            Get-ChildItem $env:ELECTRON_BUILDER_NSIS_DIR -ErrorAction SilentlyContinue | Select-Object Name | Format-Table
            exit 1
          }
          Write-Host "elevate.exe confirmed at: $env:ELECTRON_BUILDER_NSIS_DIR\elevate.exe"

      - name: Build NSIS installer
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          Write-Host "ELECTRON_BUILDER_NSIS_DIR=$env:ELECTRON_BUILDER_NSIS_DIR"
          npx electron-builder --win nsis --prepackaged ./win-unpacked --publish never
          Write-Host "=== Built files ==="
          Get-ChildItem release/ | Select-Object Name, @{n="SizeMB";e={[math]::Round($_.Length/1MB,1)}} | Format-Table

      - name: Upload NSIS installer and latest.yml
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $installer = Get-ChildItem -Path "release" -Filter "*.exe" |
            Where-Object { $_.Name -notlike "*unpack*" } |
            Select-Object -First 1
          if (-not $installer) {
            Write-Error "No installer .exe found in release/"
            exit 1
          }
          Write-Host "Uploading: $($installer.Name) ($([math]::Round($installer.Length/1MB,1)) MB)"
          gh release upload "v${{ inputs.version }}" "$($installer.FullName)" --clobber

          $latestYml = Get-ChildItem -Path "release" -Filter "latest.yml" | Select-Object -First 1
          if ($latestYml) {
            Write-Host "Uploading latest.yml"
            gh release upload "v${{ inputs.version }}" "$($latestYml.FullName)" --clobber
          }
          Write-Host "Done - NSIS installer published to v${{ inputs.version }}"
